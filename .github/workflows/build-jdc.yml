name: 编译京东云雅典娜 RE-CS-02 最小系统固件
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检出当前仓库配置文件
        uses: actions/checkout@v4
        with:
          path: jdc

      - name: 安装编译系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev libncursesw5-dev git wget \
            unzip python3 python3-distutils python3-setuptools cmake \
            libssl-dev curl file gawk gettext libelf-dev flex bison \
            libjson-c-dev libusb-1.0-0-dev uuid-dev pkg-config \
            autoconf automake m4 libtool bc time rsync zip

      - name: 克隆 Lean Lede 源码
        run: git clone --depth=1 https://github.com/coolsnowwolf/lede.git lede

      - name: 更新并安装全部 feeds 软件源
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 删除lean全套插件、passwall、libselinux，保留完整LuCI feeds目录
        run: |
          cd lede
          rm -rf package/lean
          rm -rf package/libs/libselinux
          rm -rf package/feeds/luci/luci-app-passwall
          ./scripts/feeds clean

      - name: 执行自定义diy脚本
        run: |
          cd lede
          [ -f diy.sh ] && chmod +x diy.sh && bash diy.sh || true

      # 【核心修复】直接复制完整预配置，彻底跳过交互式defconfig（消除terminal报错）
      - name: 直接写入完整自定义.config（内置平台+LuCI全套开关）
        run: |
          cp jdc/configs/jdcloud_re_cs02.config lede/.config
          cp jdc/scripts/diy.sh lede/diy.sh 2>/dev/null || true

      - name: 静默同步配置 oldconfig（无图形终端，纯后台执行）
        run: |
          cd lede
          make oldconfig 2>&1 | tee -a build-full.log

      - name: 清理旧编译缓存，避免残留编译错误
        run: |
          cd lede
          rm -rf build_dir staging_dir

      - name: 预下载全部软件包源码
        run: |
          cd lede
          make download -j$(nproc) 2>&1 | tee -a build-full.log
          find dl -size -1024c -exec rm -f {} \;

      - name: 编译固件，全程输出日志保存
        run: |
          cd lede
          make -j$(nproc) V=s 2>&1 | tee -a build-full.log || make -j1 V=s 2>&1 | tee -a build-full.log

      - name: 打包编译日志（剔除dl源码文件夹，缩小压缩包）
        run: |
          cd lede
          zip -r build-logs.zip build-full.log .config logs/ || true

      # 分开上传：日志必传，固件仅存在文件才生成附件
      - name: 上传完整编译日志包
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: compile-logs
          path: lede/build-logs.zip

      - name: 上传路由器固件镜像
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jdcloud-re-cs-02-firmware
          path: |
            lede/bin/targets/qualcommax/ipq60xx/*.bin
            lede/bin/targets/qualcommax/ipq60xx/*.ubi
            lede/bin/targets/qualcommax/ipq60xx/*.itb
            lede/bin/targets/qualcommax/ipq60xx/*.manifest
