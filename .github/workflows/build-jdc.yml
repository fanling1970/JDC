name: 编译京东云雅典娜 RE-CS-02 最小系统固件

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          path: jdc

      - name: 安装编译依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libncurses5-dev libncursesw5-dev git wget \
            unzip python3 python3-distutils python3-setuptools cmake \
            libssl-dev curl file gawk gettext libelf-dev flex bison \
            libjson-c-dev libusb-1.0-0-dev uuid-dev pkg-config \
            autoconf automake m4 libtool bc time rsync

      - name: 克隆 lede 源码
        run: git clone --depth=1 https://github.com/coolsnowwolf/lede.git lede

      - name: 复制配置和自定义文件
        run: |
          cp jdc/configs/jdcloud_re_cs02.config lede/.config
          cp jdc/scripts/diy.sh lede/diy.sh 2>/dev/null || true

      - name: 更新并安装 feeds
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 运行自定义脚本
        run: |
          cd lede
          [ -f diy.sh ] && chmod +x diy.sh && bash diy.sh || true

      - name: 生成最终配置
        run: |
          cd lede
          make defconfig

      - name: 下载软件包源码
        run: |
          cd lede
          make download -j$(nproc)
          find dl -size -1024c -exec rm -f {} \;

      - name: 编译固件
        run: |
          cd lede
          make -j$(nproc) V=s || make -j1 V=s

      - name: 上传固件产物
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jdcloud-re-cs-02-minimal
          path: |
            lede/bin/targets/qualcommax/ipq60xx/*.bin
            lede/bin/targets/qualcommax/ipq60xx/*.manifest
            lede/bin/targets/qualcommax/ipq60xx/*.ubi
            lede/bin/targets/qualcommax/ipq60xx/*.itb
